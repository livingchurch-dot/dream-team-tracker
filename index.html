<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Living Church — Dream Team Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f2f2f2;color:#222}
.hdr{background:#C0392B;color:#fff;padding:16px;text-align:center}
.hdr h1{font-size:16px;font-weight:700}
.hdr p{font-size:11px;opacity:.82;margin-top:3px}
.live-dot{display:inline-flex;align-items:center;gap:5px;background:#27AE60;color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:10px;margin-top:6px}
.live-dot span{width:7px;height:7px;border-radius:50%;background:#fff;animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.month-bar{display:flex;overflow-x:auto;background:#96281B;padding:0 8px;gap:4px;scrollbar-width:none}
.month-bar::-webkit-scrollbar{display:none}
.mbtn{flex-shrink:0;padding:9px 14px;font-size:12px;font-weight:600;color:rgba(255,255,255,.6);border:none;background:transparent;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap}
.mbtn.active{color:#fff;border-bottom-color:#E67E22}
.name-wrap{background:#fff;border-bottom:1px solid #eee}
.name-bar{background:#fff;padding:10px 14px;display:flex;align-items:center;gap:10px;max-width:640px;margin:0 auto;width:100%}
.name-bar label{font-size:12px;color:#666;font-weight:600;white-space:nowrap}
.name-bar input{flex:1;padding:7px 10px;border:1.5px solid #E67E22;border-radius:6px;font-size:13px}
.teams{padding:10px 12px;max-width:640px;margin:0 auto;display:flex;flex-direction:column;gap:8px}
.tcard{border-radius:8px;overflow:hidden;border:1px solid #ddd;background:#fff}
.thead{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;cursor:pointer;user-select:none}
.tname{font-size:13px;font-weight:700}
.tmeta{display:flex;align-items:center;gap:8px}
.tprog{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
.chev{font-size:18px;transition:transform .2s}
.chev.open{transform:rotate(180deg)}
.tbody{border-top:1px solid #eee}
.lrow{padding:7px 14px;font-size:11px;color:#777;background:#fafafa;display:flex;gap:6px;flex-wrap:wrap;align-items:center;font-weight:600;border-bottom:1px solid #eee}
.lbadge{background:#E67E22;color:#fff;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.plist{padding:8px 12px;display:flex;flex-direction:column;gap:4px}
.pitem{border-radius:6px;border:1px solid #eee;overflow:hidden}
.prow{display:flex;align-items:center;justify-content:space-between;padding:9px 11px;cursor:pointer;background:#fff;transition:background .15s;gap:8px}
.prow:hover{background:#fff8f5}
.prow.sel{background:#fff3e8}
.prow.done{background:#f0faf3}
.pinfo{display:flex;flex-direction:column;gap:3px;flex:1;min-width:0}
.pname{font-size:13px}.pname.L{font-weight:700}
.pfamily{font-size:10px;color:#999;display:flex;gap:4px;flex-wrap:wrap}
.ftag{background:#f0f0f0;color:#666;padding:1px 7px;border-radius:10px;font-size:10px;white-space:nowrap}
.ftag.spouse{background:#fde8d8;color:#a84300}
.ftag.kids{background:#e8f4fd;color:#1a5276}
.pstat{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;white-space:nowrap;flex-shrink:0}
.s-done{background:#d4edda;color:#1B5E20}
.s-part{background:#fff3cd;color:#7d5a00}
.s-pend{background:#f0f0f0;color:#888}
.pform{padding:12px;background:#fffaf5;border-top:1px solid #ffe0c0;display:flex;flex-direction:column;gap:8px}
.fam-banner{background:#fff3e0;border:1px solid #ffe0b2;border-radius:6px;padding:8px 10px;font-size:12px;color:#7c4a00;display:flex;gap:6px;align-items:center}
.wpair{background:#fff;border:1px solid #f0dece;border-radius:7px;padding:10px}
.wlabel{font-size:11px;font-weight:700;color:#E67E22;margin-bottom:8px;text-transform:uppercase;letter-spacing:.4px}
.wsub{font-size:10px;color:#bbb;font-weight:400;text-transform:none;letter-spacing:0}
.irow{display:flex;flex-direction:column;gap:3px;margin-bottom:7px}
.irow:last-child{margin-bottom:0}
.irow label{font-size:11px;color:#666}
.irow input{padding:7px 10px;border:1px solid #ddd;border-radius:5px;font-size:13px;width:100%}
.irow input:focus{outline:none;border-color:#E67E22;box-shadow:0 0 0 2px rgba(230,126,34,.12)}
.sbtn{background:#C0392B;color:#fff;border:none;padding:10px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;width:100%;margin-top:2px}
.sbtn:hover{background:#A93226}
.sbtn:disabled{background:#ccc;cursor:not-allowed}
.who{font-size:10px;color:#bbb;text-align:right;margin-top:5px;font-style:italic}
.footer-wrap{max-width:640px;margin:0 auto}
.refresh-btn{display:block;width:100%;padding:11px;background:#fff;border:none;border-top:1px solid #e8e8e8;font-size:12px;color:#999;cursor:pointer;text-align:center}
.refresh-btn:hover{color:#C0392B}
.sumbar{background:#fff;border-top:2px solid #C0392B;padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
.sumtxt{font-size:12px;color:#666}
.sumct{font-size:14px;font-weight:700;color:#C0392B}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#27AE60;color:#fff;padding:10px 22px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
.toast.err{background:#C0392B}
</style>
</head>
<body>
<div class="hdr">
  <h1>Living Church — Dream Team Tracker</h1>
  <p>Log home invitations for your team each month</p>
  <div class="live-dot"><span></span>LIVE — shared with your whole team</div>
</div>
<div class="month-bar" id="mbar"></div>
<div class="name-wrap">
  <div class="name-bar">
    <label>Your name:</label>
    <input type="text" id="userName" placeholder="Enter your name before saving..." oninput="saveName()"/>
  </div>
</div>
<div id="root"><p style="padding:30px;text-align:center;color:#aaa">Loading...</p></div>
<div class="footer-wrap">
  <button class="refresh-btn" onclick="loadMonth()">&#8635;&nbsp; Refresh — see latest updates from your team</button>
  <div class="sumbar">
    <span class="sumtxt">Completed this month</span>
    <span class="sumct" id="sumCount">— / —</span>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const SB_URL='https://emvlygxareqiyxebeipe.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVtdmx5Z3hhcmVxaXl4ZWJlaXBlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MzU2MTUsImV4cCI6MjA5NjAxMTYxNX0.vQEyne4YF5YwkQl2WQeqOmciE-kK2SAehk87cudD7ZI';
const HEADERS={'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};
const MONTHS=["July 2026","August 2026","September 2026","October 2026","November 2026","December 2026"];
const FAMILY={
  "Toun":{s:"Opemipo"},"Opemipo":{s:"Toun"},
  "Rebecca":{s:"Eugenia"},"Eugenia":{s:"Rebecca"},
  "Marie":{k:3},"Deeksha":{s:"Anil",k:1},"Anil":{s:"Deeksha",k:1},
  "Lucas":{s:"Wife"},"Maggie":{k:2},"Adeola":{k:3},
  "Fabio":{s:"Juliana",k:2},"Juliana":{s:"Fabio",k:2},
  "Saraspandee":{s:"Joanna"},"Joanna":{s:"Saraspandee"},
  "Miya":{s:"Ria & Sonia"},"Ria":{s:"Miya & Sonia"},"Sonia":{s:"Miya & Ria"},
  "Ruth":{s:"Mark S."},"Mark S.":{s:"Ruth"},
  "Bethany":{s:"Tobi"},"Tobi":{s:"Bethany"},
  "Benita":{s:"Oscar"},"Oscar":{s:"Benita"},
  "Charis":{s:"Husband"},"Felipe":{s:"Wife"},
  "Daniel":{s:"Amanda"},"Jillian":{k:1},
  "Melody":{k:3},"Taruna":{s:"Husband"},
  "Livia":{k:1}
};
const TEAMS={
  "Food & Beverage":{color:"#E65100",bg:"#FFF3E0",leaders:["Davide","Maryanne"],members:["Toun","Rebecca","Renooka","Marie","Deeksha","Lucas","Maggie","Christiana","Adeola","Nishita","Fabio","Maisie"]},
  "Greeters":{color:"#1B5E20",bg:"#F1F8E9",leaders:["Domenico","Roberta"],members:["Eugenia","Paras","Larissa","Opemipo","Reenoka","Caitlin","Patricia","Anna","Angela M.","Saraspandee","Juliana","Inese"]},
  "Info Point":{color:"#0D47A1",bg:"#E3F2FD",leaders:["Quinette"],members:["Miya"]},
  "Living Kids":{color:"#BF360C",bg:"#FBE9E7",leaders:["Veronica","Pietro","Angela S."],members:["Ria","Ruth","Benita","Bethany","Charis","Smitha","Irish","Sarah S.","Arpana"]},
  "Media Team":{color:"#4A148C",bg:"#F3E5F5",leaders:["Tito","Marco"],members:["Prashani","Felipe","Daniel","Toby","Mark S.","Oscar","Enyo","Jillian"]},
  "Parking Team":{color:"#006064",bg:"#E0F7FA",leaders:["Shawn"],members:["Tobi","Esther"]},
  "Tech Team":{color:"#4E342E",bg:"#EFEBE9",leaders:["Antonino"],members:["Mark","Emmanuel"]},
  "Ushers":{color:"#311B92",bg:"#EDE7F6",leaders:["Giulia"],members:["Melody","Sonia","Taruna","Livia","Anil","Joanna"]}
};
let curMonth=MONTHS[0],openTeam=null,openPerson=null,dbData={};
function familyTags(n){const f=FAMILY[n];if(!f)return'';let t='';if(f.s)t+=`<span class="ftag spouse">&#9825; ${f.s}</span>`;if(f.k)t+=`<span class="ftag kids">&#9679; ${f.k} child${f.k>1?'ren':''}</span>`;return t?`<div class="pfamily">${t}</div>`:'';}
function familyBanner(n){const f=FAMILY[n];if(!f)return'';let txt='';if(f.s&&f.k)txt=`Married to ${f.s} &mdash; ${f.k} child${f.k>1?'ren':''}`;else if(f.s)txt=`Married to ${f.s}`;else if(f.k)txt=`${f.k} child${f.k>1?'ren':''}`;return txt?`<div class="fam-banner">&#128106; ${txt}</div>`:'';}
async function sbGet(month){const res=await fetch(`${SB_URL}/rest/v1/tracker_entries?month=eq.${encodeURIComponent(month)}&select=*`,{headers:HEADERS});if(!res.ok)throw new Error(await res.text());return res.json();}
async function sbUpsert(row){const res=await fetch(`${SB_URL}/rest/v1/tracker_entries`,{method:'POST',headers:{...HEADERS,'Prefer':'resolution=merge-duplicates,return=minimal'},body:JSON.stringify(row)});if(!res.ok)throw new Error(await res.text());}
async function loadMonth(){document.getElementById('root').innerHTML='<p style="padding:30px;text-align:center;color:#aaa">Loading...</p>';try{const rows=await sbGet(curMonth);dbData={};for(const r of rows)dbData[r.person_name]=r;render();}catch(e){document.getElementById('root').innerHTML=`<p style="padding:20px;color:#C0392B;font-size:13px">Error: ${e.message}</p>`;}}
async function saveEntry(person,weeks){const who=document.getElementById('userName').value.trim()||'Unknown';const row={month:curMonth,person_name:person,week1_date:weeks.d1,week1_guest:weeks.g1,week2_date:weeks.d2,week2_guest:weeks.g2,week3_date:weeks.d3,week3_guest:weeks.g3,week4_date:weeks.d4,week4_guest:weeks.g4,updated_by:who,updated_at:new Date().toISOString()};const btn=document.getElementById('saveBtn');if(btn){btn.disabled=true;btn.textContent='Saving...';}try{await sbUpsert(row);dbData[person]=row;showToast('Saved!');openPerson=null;render();}catch(e){showToast('Save failed: '+e.message,true);if(btn){btn.disabled=false;btn.textContent=`Save ${person}'s record`;}}}
function status(p){const r=dbData[p];if(!r)return'pend';const f=[r.week1_date,r.week2_date,r.week3_date,r.week4_date].filter(Boolean).length;return f===4?'done':f>0?'part':'pend';}
function stLabel(s){return s==='done'?'&#10003; Done':s==='part'?'~ Partial':'Pending';}
function stClass(s){return s==='done'?'s-done':s==='part'?'s-part':'s-pend';}
function totals(){let done=0,total=0;for(const t of Object.values(TEAMS))for(const p of[...t.leaders,...t.members]){total++;if(status(p)==='done')done++;}return{done,total};}
function teamTotals(tn){const all=[...TEAMS[tn].leaders,...TEAMS[tn].members];return{done:all.filter(p=>status(p)==='done').length,total:all.length};}
function render(){
  document.getElementById('mbar').innerHTML=MONTHS.map(m=>`<button class="mbtn${m===curMonth?' active':''}" onclick="setMonth('${m}')">${m.replace(' 2026','')}</button>`).join('');
  const{done,total}=totals();document.getElementById('sumCount').textContent=`${done} / ${total} people`;
  let h='<div class="teams">';
  for(const[tn,t]of Object.entries(TEAMS)){
    const{done:td,total:tt}=teamTotals(tn);const isOpen=openTeam===tn;
    const all=[...t.leaders.map(n=>({n,r:'L'})),...t.members.map(n=>({n,r:'M'}))];
    h+=`<div class="tcard"><div class="thead" style="background:${t.bg}" onclick="toggleTeam('${tn}')"><span class="tname" style="color:${t.color}">${tn}</span><div class="tmeta"><span class="tprog" style="background:${t.color}22;color:${t.color}">${td}/${tt}</span><span class="chev${isOpen?' open':''}">&#8964;</span></div></div>`;
    if(isOpen){
      h+=`<div class="tbody"><div class="lrow"><span>Leaders:</span>${t.leaders.map(l=>`<span class="lbadge">${l}</span>`).join('')}</div><div class="plist">`;
      for(const{n,r}of all){
        const st=status(n),isSel=openPerson===n,row=dbData[n]||{},safe=n.replace(/'/g,"\\'");
        h+=`<div class="pitem"><div class="prow${isSel?' sel':''}${st==='done'&&!isSel?' done':''}" onclick="selPerson('${safe}')"><div class="pinfo"><span class="pname ${r}">${n}</span>${familyTags(n)}</div><span class="pstat ${stClass(st)}">${stLabel(st)}</span></div>`;
        if(isSel){
          const wk=[['Week 1','First half','d1','g1','week1_date','week1_guest'],['Week 2','First half','d2','g2','week2_date','week2_guest'],['Week 3','Second half','d3','g3','week3_date','week3_guest'],['Week 4','Second half','d4','g4','week4_date','week4_guest']];
          h+=`<div class="pform">${familyBanner(n)}`;
          for(const[label,half,dk,gk,dbdk,dbgk]of wk){h+=`<div class="wpair"><div class="wlabel">${label} <span class="wsub">— ${half} of month</span></div><div class="irow"><label>Date of invitation</label><input type="date" id="${dk}" value="${row[dbdk]||''}"/></div><div class="irow"><label>Guest invited</label><input type="text" id="${gk}" value="${row[dbgk]||''}" placeholder="Who did you invite?"/></div></div>`;}
          if(row.updated_by)h+=`<div class="who">Last updated by <strong>${row.updated_by}</strong>${row.updated_at?' &middot; '+new Date(row.updated_at).toLocaleDateString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}):''}</div>`;
          h+=`<button class="sbtn" id="saveBtn" onclick="savePerson('${safe}')">Save ${n}&rsquo;s record</button></div>`;
        }
        h+=`</div>`;
      }
      h+=`</div></div>`;
    }
    h+=`</div>`;
  }
  h+=`</div>`;document.getElementById('root').innerHTML=h;
}
function setMonth(m){curMonth=m;openTeam=null;openPerson=null;loadMonth();}
function toggleTeam(t){openTeam=openTeam===t?null:t;openPerson=null;render();}
function selPerson(p){openPerson=openPerson===p?null:p;render();}
function savePerson(p){const w={};for(let i=1;i<=4;i++){w['d'+i]=document.getElementById('d'+i)?.value||'';w['g'+i]=document.getElementById('g'+i)?.value||'';}saveEntry(p,w);}
function saveName(){try{localStorage.setItem('lc_name',document.getElementById('userName').value);}catch(e){}}
function showToast(msg,isErr=false){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(isErr?' err':'');setTimeout(()=>{t.className='toast';},2500);}
try{const n=localStorage.getItem('lc_name');if(n)document.getElementById('userName').value=n;}catch(e){}
loadMonth();
</script>
</body>
</html>
